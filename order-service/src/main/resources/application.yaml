server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/orderdb?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: logitrack-secret-key-2024-muito-segura

management:
  endpoints:
    web:
      exposure:
        include: health, metrics